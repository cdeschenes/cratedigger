<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cratedigger{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Nav bar ── */
    .topnav {
      background: #0d0d0d;
      border-bottom: 1px solid #1e1e1e;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: .95rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: .45rem;
      margin-right: 1.5rem;
      white-space: nowrap;
    }
    .nav-logo-wrap {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      color: #fff;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: .15rem;
    }

    .nav-link {
      font-size: .85rem;
      color: #666;
      text-decoration: none;
      padding: .35rem .75rem;
      border-radius: 6px;
      transition: color .15s, background .15s;
      white-space: nowrap;
    }
    .nav-link:hover  { color: #e0e0e0; background: #1a1a1a; }
    .nav-link.active { color: #e0e0e0; background: #1e1e1e; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: .85rem;
      margin-left: auto;
    }

    .nav-version {
      font-size: .72rem;
      color: #3a3a3a;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      transition: color .3s;
    }
    .nav-version-current  { color: #4ade80; }
    .nav-version-outdated { color: #f87171; }
    .nav-version-outdated a { color: inherit; text-decoration: none; }
    .nav-version-outdated a:hover { text-decoration: underline; }

    .nav-github {
      color: #3a3a3a;
      display: flex;
      align-items: center;
      line-height: 0;
      transition: color .15s;
    }
    .nav-github:hover { color: #777; }

    .nav-signout {
      font-size: .8rem;
      color: #555;
      text-decoration: none;
      transition: color .15s;
      white-space: nowrap;
    }
    .nav-signout:hover { color: #e0e0e0; }

    @media (max-width: 640px) {
      .topnav { padding: 0 1rem; }
      .nav-brand { margin-right: .75rem; }
      .nav-link { padding: .35rem .5rem; font-size: .8rem; }
      .nav-version { display: none; }
    }
    @media (max-width: 480px) {
      .nav-github { display: none; }
      .nav-signout { font-size: .75rem; }
    }

    {% block head_css %}{% endblock %}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="topnav">
    <a class="nav-brand" href="/">
      <span class="nav-logo-wrap" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="1.2"/>
        </svg>
      </span>
      Cratedigger
    </a>
    <div class="nav-links">
      <a class="nav-link {% block nav_active_viewer %}{% endblock %}" href="/">Report Viewer</a>
      <a class="nav-link {% block nav_active_dashboard %}{% endblock %}" href="/dashboard">Run Dashboard</a>
      <a class="nav-link {% block nav_active_help %}{% endblock %}" href="/help">Help</a>
    </div>
    <div class="nav-right">
      <span class="nav-version" id="nav-version">v{{ version }}</span>
      <a class="nav-github" href="https://github.com/cdeschenes/cratedigger" target="_blank" rel="noopener" title="GitHub">
        <svg width="17" height="17" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
      <a class="nav-signout" href="/logout">Sign out</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

<script>
async function imgFallback(img) {
  img.onerror = null;
  img.onload  = null;
  const artist = img.dataset.artist || '';
  const album  = img.dataset.album  || '';
  if (artist && album) {
    try {
      const q = encodeURIComponent(`${artist} ${album}`);
      const r = await fetch(
        `https://itunes.apple.com/search?term=${q}&entity=album&limit=1&media=music`
      );
      if (r.ok) {
        const result = (await r.json()).results?.[0];
        if (result?.artworkUrl100) {
          img.src = result.artworkUrl100.replace('100x100bb', '600x600bb');
          return;
        }
      }
    } catch {}
  }
  img.style.display = 'none';
  const ph = document.createElement('div');
  ph.className = 'card-img-placeholder';
  ph.textContent = 'No Artwork';
  img.after(ph);
}

(async () => {
  const el = document.getElementById('nav-version');
  if (!el) return;
  const CACHE_KEY = 'cd_latest_ver';
  const TTL = 3600 * 1000;
  let latest = null;
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && Date.now() - cached.ts < TTL) {
      latest = cached.tag;
    } else {
      const r = await fetch(
        'https://api.github.com/repos/cdeschenes/cratedigger/releases/latest',
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      if (r.ok) {
        latest = (await r.json()).tag_name;
        localStorage.setItem(CACHE_KEY, JSON.stringify({ tag: latest, ts: Date.now() }));
      }
    }
  } catch {}
  if (!latest) return;
  const strip = v => v.replace(/^v/, '');
  if (strip(el.textContent.trim()) === strip(latest)) {
    el.classList.add('nav-version-current');
  } else {
    el.classList.add('nav-version-outdated');
    const a = document.createElement('a');
    a.href = 'https://github.com/cdeschenes/cratedigger/releases/latest';
    a.target = '_blank';
    a.rel = 'noopener';
    a.title = `Update available: ${latest}`;
    el.after(a);
    a.appendChild(el);
  }
})();
</script>
</body>
</html>
